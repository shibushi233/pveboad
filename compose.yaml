services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PVE_PANEL_ENVIRONMENT: development
      PVE_PANEL_DEBUG: "true"
      PVE_PANEL_SQLITE_PATH: /data/app.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
